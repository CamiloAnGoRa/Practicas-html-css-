<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Dashboard</title>
</head>
<body>
    <div class="flexbox">
        <header class="head">
            <h1>Dashboard</h1>

            <div class="searchbar">
                <input type="text" placeholder="Search for projects..." class="searchbar__input">
            </div>
        </header>

        <div class="section_content">
            <aside class="main__aside">
                <ul class="aside_list">
                    <li class="block_item"><a href="#form" class="link__block">Forms</a></li>
                    <li class="block_item"><a href="#" class="link__block">Cards</a></li>
                    <li class="block_item"><a href="#" class="link__block">Buttons</a></li>
                    <li class="block_item"><a href="#" class="link__block">Modals</a></li>
                    <li class="block_item"><a href="#" class="link__block">Tables</a></li>
                    <li class="block_item"><a href="#" class="link__block">Pages</a></li>
                    <li class="block_item">
                        <input type="button" value="Create Account" class="aside__button">
                    </li>
                </ul>
            </aside>

            <div class="separete_section">
                <main main__content>
                    <div class="block__rate">
                        <div class="rateproject">
                            <a href="#" class="block__rate--option">Start this project on GitHub</a>
                        </div>
                        <div class="moreinformation">
                            <a href="#" class="block__rate--option">View More</a>
                        </div>
                    </div>

                    <div class="form__div">
                        <form action="POST" id="form">
                            <h2>Formulario de registro</h2>

                            <fieldset class="details__form">
                                <legend>personal information</legend>
                                    <label for="name" class="label__form--details">Name: </label>
                                    <input type="text" class="userinfo" placeholder="Camilo Andres" id="name" required>

                                    <label for="lastname" class="label__form--details">Last Name: </label>
                                    <input type="text" class="userinfo" placeholder="Gomez Rativa" id="lastname" required>
                            </fieldset>

                            <fieldset class="details__form">
                                <legend>user info</legend>
                                    <label for="email" class="label__form--details">Email: </label>
                                    <input type="email" class="userinfo" placeholder="example@gmail.com" id="email" required>

                                    <label for="user" class="label__form--details">User: </label>
                                    <input type="text" class="userinfo" placeholder="pepito123" id="user" required>
                            </fieldset>
                            <input type="button" value="Register" class="registerbutton__form">
                            
                            
                        </form>
                    </div>
                </main>
            </div>
        </div>
    </div>
</body>
</html>
