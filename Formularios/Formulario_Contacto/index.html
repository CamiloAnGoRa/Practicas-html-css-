<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="content">
        <!-- Menu superior (decoracion) -->
        <div class="menu_superior">
            <a href="#"> Home </a>
            <a href="#"> About </a>
            <a href="#"> Services </a>
            <a href="#"> Contact </a>
        </div>

        <!--Formulario de contacto-->
        <form class="form_info">

            <h2 class="contact">Contact Us</h2>

            <div class="blo_sep">
                <!--Información de la empresa-->
                <div class="info">
                    <h2 class=" ">Get In Touch</h2>
                    <h3 class="subinfo">* 123 Main Street, Mars</h3>
                    <h3 class="subinfo">* mambo@correo.com</h3>
                    <h3 class="subinfo">* (+123) 123-456-7890</h3>
                </div>

                <!--Registro de información de usuario-->

                <div class="regi_info">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea name="Mesag" placeholder="Your Message"></textarea>

                    <button type="submit">Send Message</button>
                </div>
            </div>
        </form>





    </div>

</body>
</html>
